services:
  backend:
    image: ziadnader1/tazkarty-backend:latest
    container_name: tazkarty-backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    # Override NODE_ENV to ensure it runs in a predictable mode, or keep as development
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/tazkarty
    depends_on:
      - mongodb
    restart: unless-stopped

  frontend:
    image: ziadnader1/tazkarty-frontend:latest
    container_name: tazkarty-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    restart: unless-stopped

  mongodb:
    image: mongo:6
    container_name: tazkarty-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mongo_data:
