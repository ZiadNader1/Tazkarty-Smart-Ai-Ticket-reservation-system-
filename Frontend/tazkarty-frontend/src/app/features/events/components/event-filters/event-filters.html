<form [formGroup]="filterForm"
    class="bg-dark-card rounded-xl shadow-lg border border-gray-800 p-6 space-y-6 lg:space-y-0 lg:flex lg:gap-4 items-end">

    <!-- Search -->
    <div class="flex-1 space-y-1">
        <label class="text-xs font-bold text-gray-400 uppercase tracking-wide">Search</label>
        <div class="relative">
            <input type="text" formControlName="query" placeholder="Event name, artist, or keyword..."
                class="w-full pl-10 pr-4 py-2.5 bg-gray-900 border border-gray-700 text-white rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500 transition placeholder-gray-500" />
            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-500">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
            </span>
        </div>
    </div>

    <!-- Category (Hidden in Entertainment View) -->
    @if (!isEntertainment) {
    <div class="w-full lg:w-48 space-y-1">
        <label class="text-xs font-bold text-gray-400 uppercase tracking-wide">Category</label>
        <select formControlName="category"
            class="w-full px-4 py-2.5 bg-gray-900 border border-gray-700 text-white rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500 transition appearance-none cursor-pointer">
            <option value="">All Categories</option>
            @for (cat of categories; track cat._id) {
            <option [value]="cat._id">{{ cat.name }}</option>
            }
        </select>
    </div>
    }

    <!-- Venue -->
    <div class="w-full lg:w-48 space-y-1">
        <label class="text-xs font-bold text-gray-400 uppercase tracking-wide">Venue</label>
        <select formControlName="venue"
            class="w-full px-4 py-2.5 bg-gray-900 border border-gray-700 text-white rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500 transition appearance-none cursor-pointer">
            <option value="">All Venues</option>
            @for (venue of venues; track venue._id) {
            <option [value]="venue._id">{{ venue.name }}</option>
            }
        </select>
    </div>

    <!-- Sort -->
    <div class="w-full lg:w-40 space-y-1">
        <label class="text-xs font-bold text-gray-400 uppercase tracking-wide">Sort By</label>
        <select formControlName="sort"
            class="w-full px-4 py-2.5 bg-gray-900 border border-gray-700 text-white rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500 transition appearance-none cursor-pointer">
            <option value="date">Date (Newest)</option>
            <option value="price_asc">Price (Low to High)</option>
            <option value="price_desc">Price (High to Low)</option>
            <option value="rating">Rating</option>
        </select>
    </div>

    <!-- Reset -->
    <button type="button" (click)="resetFilters()"
        class="px-4 py-2.5 text-gray-400 hover:text-red-500 hover:bg-red-500/10 rounded-lg transition-colors text-sm font-medium">
        Reset
    </button>
</form>
